<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Access – Reefline21 Fish Factory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="bg-black text-light d-flex align-items-center" style="min-height: 100vh;">
  <div class="container" style="max-width: 420px;">
    <h1 class="h3 mb-4 text-center">Admin Access</h1>
    <div class="card bg-dark text-light border-secondary">
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label for="passcode" class="form-label">Passcode</label>
            <input
              type="password"
              class="form-control"
              id="passcode"
              name="passcode"
              autocomplete="off"
              autofocus
              required
            />
          </div>
          {% if error %}
          <div class="alert alert-danger py-2" role="alert">
            {{ error }}
          </div>
          {% endif %}
          <div class="d-flex justify-content-between">
            <a href="/" class="btn btn-outline-light">Back to Gallery</a>
            <button type="submit" class="btn btn-primary">Enter Admin</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
